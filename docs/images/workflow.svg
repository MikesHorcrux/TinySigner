<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
<title id="title">TinySigner signing workflow</title>
<desc id="desc">Four step workflow: open PDF, place fields, choose source, export signed copy.</desc>
<defs><linearGradient id="card" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f9fbfb"/><stop offset="1" stop-color="#e9f6f7"/></linearGradient><linearGradient id="ink" x1="0" x2="1"><stop offset="0" stop-color="#0b2940"/><stop offset="1" stop-color="#18c8d0"/></linearGradient></defs>
<rect width="1400" height="520" rx="28" fill="#071b2a"/>
<text x="70" y="78" font-family="Avenir Next, sans-serif" font-size="34" fill="#f4fbff" font-weight="700">Local PDF signing flow</text>
<g font-family="Avenir Next, sans-serif">
  <g transform="translate(70 130)"><rect width="285" height="300" rx="24" fill="url(#card)"/><text x="28" y="55" font-size="21" fill="#0b2940" font-weight="700">1. Open</text><rect x="64" y="92" width="150" height="176" rx="12" fill="#ffffff" stroke="#bfd4dc"/><path d="M178 92 L214 128 L178 128 Z" fill="#d8edf0"/><text x="28" y="266" font-size="15" fill="#43606e">Pick a PDF. Original stays untouched.</text></g>
  <g transform="translate(390 130)"><rect width="285" height="300" rx="24" fill="url(#card)"/><text x="28" y="55" font-size="21" fill="#0b2940" font-weight="700">2. Place</text><rect x="55" y="98" width="178" height="96" rx="8" fill="#ffffff" stroke="#bfd4dc"/><rect x="75" y="150" width="138" height="3" fill="#0b2940" opacity="0.45"/><path d="M78 136 C105 106 134 174 168 136 S202 124 222 134" fill="none" stroke="url(#ink)" stroke-width="8" stroke-linecap="round"/><text x="28" y="266" font-size="15" fill="#43606e">Click the signature line. Drag or resize.</text></g>
  <g transform="translate(710 130)"><rect width="285" height="300" rx="24" fill="url(#card)"/><text x="28" y="55" font-size="21" fill="#0b2940" font-weight="700">3. Choose</text><rect x="48" y="101" width="190" height="42" rx="10" fill="#0b2940"/><text x="68" y="128" font-size="15" fill="#ecfbfd">Typed name</text><rect x="48" y="158" width="190" height="42" rx="10" fill="#18c8d0"/><text x="68" y="185" font-size="15" fill="#041014" font-weight="700">Drawn signature</text><rect x="48" y="215" width="190" height="42" rx="10" fill="#0b2940"/><text x="68" y="242" font-size="15" fill="#ecfbfd">Imported image</text></g>
  <g transform="translate(1030 130)"><rect width="285" height="300" rx="24" fill="url(#card)"/><text x="28" y="55" font-size="21" fill="#0b2940" font-weight="700">4. Export</text><circle cx="142" cy="154" r="70" fill="#18c8d0"/><path d="M104 154 L134 184 L188 118" fill="none" stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round"/><text x="28" y="266" font-size="15" fill="#43606e">Flatten fields into a new signed PDF.</text></g>
</g>
</svg>