<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="520" viewBox="0 0 1400 520" role="img" aria-labelledby="title desc">
<title id="title">TinySigner CI validation</title>
<desc id="desc">A simple GitHub Actions validation flow for build and unit tests.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#071b2a"/><stop offset="1" stop-color="#102f45"/></linearGradient>
  <linearGradient id="ok" x1="0" x2="1"><stop offset="0" stop-color="#18c8d0"/><stop offset="1" stop-color="#21c063"/></linearGradient>
</defs>
<rect width="1400" height="520" rx="28" fill="url(#bg)"/>
<text x="70" y="78" font-family="Avenir Next, sans-serif" font-size="34" fill="#f4fbff" font-weight="700">Public repo validation</text>
<text x="70" y="112" font-family="Avenir Next, sans-serif" font-size="16" fill="#aebcc3">Every push builds the Mac app and runs the unit suite with code signing disabled.</text>
<g font-family="Avenir Next, sans-serif">
  <g transform="translate(70 165)">
    <rect width="290" height="230" rx="24" fill="#f7fbfb"/>
    <circle cx="52" cy="54" r="22" fill="#0b2940"/><text x="52" y="62" text-anchor="middle" font-size="22" fill="#ffffff" font-weight="700">1</text>
    <text x="88" y="62" font-size="22" fill="#0b2940" font-weight="700">Push / PR</text>
    <rect x="42" y="104" width="204" height="48" rx="12" fill="#0b2940"/><text x="64" y="134" font-size="16" fill="#ecfbff">github.com/MikesHorcrux</text>
    <text x="42" y="188" font-size="15" fill="#55707c">CI starts from the public repository.</text>
  </g>
  <path d="M385 280 H470" stroke="#18c8d0" stroke-width="8" stroke-linecap="round"/><path d="M452 260 L476 280 L452 300" fill="none" stroke="#18c8d0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(500 165)">
    <rect width="290" height="230" rx="24" fill="#f7fbfb"/>
    <circle cx="52" cy="54" r="22" fill="#0b2940"/><text x="52" y="62" text-anchor="middle" font-size="22" fill="#ffffff" font-weight="700">2</text>
    <text x="88" y="62" font-size="22" fill="#0b2940" font-weight="700">Build</text>
    <rect x="42" y="104" width="204" height="48" rx="12" fill="#0b2940"/><text x="68" y="134" font-size="16" fill="#ecfbff">xcodebuild build</text>
    <text x="42" y="188" font-size="15" fill="#55707c">CODE_SIGNING_ALLOWED=NO</text>
  </g>
  <path d="M815 280 H900" stroke="#18c8d0" stroke-width="8" stroke-linecap="round"/><path d="M882 260 L906 280 L882 300" fill="none" stroke="#18c8d0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <g transform="translate(930 165)">
    <rect width="350" height="230" rx="24" fill="#f7fbfb"/>
    <circle cx="52" cy="54" r="22" fill="url(#ok)"/><path d="M40 54 L50 64 L66 44" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="88" y="62" font-size="22" fill="#0b2940" font-weight="700">Unit tests</text>
    <rect x="42" y="104" width="246" height="48" rx="12" fill="#0b2940"/><text x="66" y="134" font-size="16" fill="#ecfbff">-only-testing:TinySignerTests</text>
    <text x="42" y="188" font-size="15" fill="#55707c">UI smoke tests stay local/manual.</text>
  </g>
</g>
</svg>
