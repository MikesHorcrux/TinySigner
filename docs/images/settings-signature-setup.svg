<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
<title id="title">Settings and signature setup</title>
<desc id="desc">A stylized TinySigner Settings window with signer profile, default assets, and signature setup sheet.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#102233"/><stop offset="1" stop-color="#0b5f61"/></linearGradient>
  <linearGradient id="card" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#f9fbfb"/><stop offset="1" stop-color="#e8f6f7"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="26" stdDeviation="26" flood-color="#00151f" flood-opacity="0.34"/></filter>
</defs>
<rect width="1400" height="760" fill="url(#bg)"/>
<circle cx="1140" cy="620" r="300" fill="#18c8d0" opacity="0.12"/>
<circle cx="180" cy="90" r="280" fill="#2b83ff" opacity="0.10"/>
<g filter="url(#shadow)">
  <rect x="110" y="86" width="1180" height="588" rx="30" fill="#172631"/>
  <rect x="110" y="86" width="1180" height="52" rx="30" fill="#243640"/>
  <circle cx="148" cy="112" r="7" fill="#ff6860"/><circle cx="174" cy="112" r="7" fill="#ffbd4a"/><circle cx="200" cy="112" r="7" fill="#31c85d"/>
  <text x="154" y="194" font-family="Avenir Next, sans-serif" font-size="32" fill="#f4fbff" font-weight="700">TinySigner Settings</text>
  <text x="154" y="228" font-family="Avenir Next, sans-serif" font-size="16" fill="#aebcc3">Manage signer details and reusable local signature assets.</text>
  <rect x="154" y="268" width="460" height="292" rx="22" fill="url(#card)"/>
  <text x="190" y="318" font-family="Avenir Next, sans-serif" font-size="22" fill="#0b2940" font-weight="700">Signer Profile</text>
  <text x="190" y="366" font-family="Avenir Next, sans-serif" font-size="14" fill="#55707c">Full name</text><rect x="190" y="378" width="330" height="38" rx="9" fill="#ffffff" stroke="#bdd4db"/><text x="210" y="403" font-family="Avenir Next, sans-serif" font-size="15" fill="#0b2940">Alex Rivera</text>
  <text x="190" y="448" font-family="Avenir Next, sans-serif" font-size="14" fill="#55707c">Initials</text><rect x="190" y="460" width="120" height="38" rx="9" fill="#ffffff" stroke="#bdd4db"/><text x="210" y="485" font-family="Avenir Next, sans-serif" font-size="15" fill="#0b2940">AR</text>
  <text x="340" y="448" font-family="Avenir Next, sans-serif" font-size="14" fill="#55707c">Date format</text><rect x="340" y="460" width="180" height="38" rx="9" fill="#ffffff" stroke="#bdd4db"/><text x="360" y="485" font-family="Avenir Next, sans-serif" font-size="15" fill="#0b2940">MMM d, yyyy</text>
  <rect x="650" y="268" width="540" height="292" rx="22" fill="url(#card)"/>
  <text x="686" y="318" font-family="Avenir Next, sans-serif" font-size="22" fill="#0b2940" font-weight="700">Signature Setup</text>
  <rect x="686" y="352" width="188" height="42" rx="12" fill="#18c8d0"/><text x="714" y="379" font-family="Avenir Next, sans-serif" font-size="15" fill="#041014" font-weight="700">Open Signature Setup</text>
  <rect x="686" y="428" width="452" height="82" rx="14" fill="#ffffff" stroke="#bdd4db"/>
  <rect x="710" y="446" width="86" height="46" rx="9" fill="#eef8f9"/><path d="M720 474 C738 448 752 496 772 472 S790 462 802 470" fill="none" stroke="#0b2940" stroke-width="5" stroke-linecap="round"/>
  <text x="820" y="462" font-family="Avenir Next, sans-serif" font-size="16" fill="#0b2940" font-weight="700">Drawn Signature</text><text x="820" y="486" font-family="Avenir Next, sans-serif" font-size="14" fill="#55707c">Default full signature</text>
  <rect x="808" y="176" width="390" height="300" rx="26" fill="#21333d" stroke="#516a75"/>
  <text x="842" y="228" font-family="Avenir Next, sans-serif" font-size="25" fill="#f4fbff" font-weight="700">Signature Setup</text>
  <text x="842" y="258" font-family="Avenir Next, sans-serif" font-size="14" fill="#aebcc3">Typed, drawn, or imported assets.</text>
  <rect x="842" y="292" width="148" height="38" rx="10" fill="#18c8d0"/><text x="866" y="317" font-family="Avenir Next, sans-serif" font-size="14" fill="#041014" font-weight="700">Save Typed</text>
  <rect x="1008" y="292" width="148" height="38" rx="10" fill="#0d1720"/><text x="1030" y="317" font-family="Avenir Next, sans-serif" font-size="14" fill="#ecfbff">Import Image</text>
  <rect x="842" y="354" width="314" height="86" rx="14" fill="#0d1720" stroke="#37505a" stroke-dasharray="7 7"/>
  <text x="862" y="386" font-family="Avenir Next, sans-serif" font-size="14" fill="#aebcc3">Draw here</text>
  <path d="M870 414 C910 380 942 440 982 408 S1052 386 1122 410" fill="none" stroke="#18c8d0" stroke-width="5" stroke-linecap="round"/>
</g>
</svg>
