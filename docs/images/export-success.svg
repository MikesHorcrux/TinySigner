<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
<title id="title">Export success actions</title>
<desc id="desc">A TinySigner export success sheet with actions to open the signed PDF, reveal it in Finder, or sign another document.</desc>
<defs>
  <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#071b2a"/><stop offset="1" stop-color="#164e5d"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#00151f" flood-opacity="0.36"/></filter>
</defs>
<rect width="1200" height="560" rx="30" fill="url(#bg)"/>
<circle cx="1010" cy="112" r="220" fill="#18c8d0" opacity="0.12"/>
<circle cx="120" cy="520" r="280" fill="#2b83ff" opacity="0.10"/>
<g filter="url(#shadow)">
  <rect x="110" y="74" width="980" height="410" rx="28" fill="#172631"/>
  <rect x="110" y="74" width="980" height="52" rx="28" fill="#243640"/>
  <circle cx="148" cy="100" r="7" fill="#ff6860"/><circle cx="174" cy="100" r="7" fill="#ffbd4a"/><circle cx="200" cy="100" r="7" fill="#31c85d"/>
  <rect x="196" y="166" width="808" height="266" rx="28" fill="#f7fbfb"/>
  <circle cx="600" cy="236" r="55" fill="#21c063" opacity="0.18"/>
  <circle cx="600" cy="236" r="36" fill="#21c063"/>
  <path d="M582 236 L596 250 L622 218" fill="none" stroke="#ffffff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="600" y="322" text-anchor="middle" font-family="Avenir Next, sans-serif" font-size="30" fill="#0b2940" font-weight="700">Signed PDF Exported</text>
  <text x="600" y="356" text-anchor="middle" font-family="Avenir Next, sans-serif" font-size="16" fill="#55707c">contract-signed.pdf</text>
  <g font-family="Avenir Next, sans-serif" font-size="15" font-weight="700">
    <rect x="274" y="386" width="184" height="42" rx="13" fill="#18c8d0"/><text x="366" y="412" text-anchor="middle" fill="#041014">Open Signed PDF</text>
    <rect x="496" y="386" width="184" height="42" rx="13" fill="#0b2940"/><text x="588" y="412" text-anchor="middle" fill="#ecfbff">Reveal in Finder</text>
    <rect x="718" y="386" width="184" height="42" rx="13" fill="#0b2940"/><text x="810" y="412" text-anchor="middle" fill="#ecfbff">Sign Another</text>
  </g>
</g>
</svg>
